<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Donos - PetCare</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <header>

        <div class="logo">

            <h1>PetCare</h1>

            <p>Cadastro de Donos</p>

        </div>


        <nav>

            <ul>

                <li>
                    <a href="index.html">
                        Início
                    </a>
                </li>


                <li>
                    <a href="animais.html">
                        Animais
                    </a>
                </li>


                <li>
                    <a href="consultas.html">
                        Consultas
                    </a>
                </li>

            </ul>

        </nav>


    </header>




    <section>


        <h2>Cadastro de Donos</h2>


        <form>


            <label>
                Nome completo
            </label>

            <input type="text" placeholder="Digite o nome do dono">


            <label>
                CPF
            </label>

            <input type="text" placeholder="Digite o CPF">


            <label>
                Telefone
            </label>

            <input type="text" placeholder="Digite o telefone">


            <label>
                E-mail
            </label>

            <input type="email" placeholder="Digite o e-mail">


            <label>
                Endereço
            </label>

            <input type="text" placeholder="Digite o endereço">


            <button type="submit">

                Cadastrar Dono

            </button>


        </form>


    </section>





    <section>


        <h2>Donos Cadastrados</h2>


        <table>


            <thead>

                <tr>

                    <th>ID</th>

                    <th>Nome</th>

                    <th>CPF</th>

                    <th>Telefone</th>

                    <th>E-mail</th>

                </tr>

            </thead>



            <tbody id="listaDonos">


                <tr>

                    <td>1</td>

                    <td>Maria Silva</td>

                    <td>000.000.000-00</td>

                    <td>(11) 99999-9999</td>

                    <td>maria@email.com</td>

                </tr>


            </tbody>


        </table>


    </section>





    <footer>

        <p>
            PetCare Clínica Veterinária
        </p>


        <p>
            Cuidando dos animais e seus responsáveis.
        </p>


    </footer>



</body>

</html>
