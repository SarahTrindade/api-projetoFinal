<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Cadastro de Animais - PetCare</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <header>

        <div class="logo">

            <h1>PetCare</h1>

            <p>Cadastro de Animais</p>

        </div>


        <nav>

            <ul>

                <li>
                    <a href="index.html">
                        Início
                    </a>
                </li>

                <li>
                    <a href="consultas.html">
                        Consultas
                    </a>
                </li>

            </ul>

        </nav>


    </header>



    <section>


        <h2>Cadastro de Animais</h2>


        <form>


            <label>
                Nome do Animal
            </label>

            <input type="text" placeholder="Digite o nome do animal">


            <label>
                Espécie
            </label>

            <input type="text" placeholder="Ex: Cachorro, Gato">


            <label>
                Raça
            </label>

            <input type="text" placeholder="Digite a raça">


            <label>
                Idade
            </label>

            <input type="number" placeholder="Digite a idade">


            <label>
                Nome do Dono
            </label>

            <input type="text" placeholder="Digite o nome do responsável">


            <button type="submit">
                Cadastrar Animal
            </button>


        </form>


    </section>



    <section>


        <h2>Animais Cadastrados</h2>


        <table>


            <thead>

                <tr>

                    <th>ID</th>

                    <th>Nome</th>

                    <th>Espécie</th>

                    <th>Raça</th>

                    <th>Idade</th>

                    <th>Dono</th>

                </tr>

            </thead>



            <tbody id="listaAnimais">


                <tr>

                    <td>1</td>

                    <td>Rex</td>

                    <td>Cachorro</td>

                    <td>Golden Retriever</td>

                    <td>3 anos</td>

                    <td>João Silva</td>

                </tr>


            </tbody>


        </table>


    </section>




    <footer>

        <p>
            PetCare Clínica Veterinária
        </p>

        <p>
            Cuidando da saúde e bem-estar dos animais.
        </p>

    </footer>



</body>

</html>
