<!DOCTYPE html>
<html lang="pt-BR">

<head>

    <meta charset="UTF-8">
    <title>Consultas - PetCare</title>

    <link rel="stylesheet" href="style.css">

</head>


<body>


    <header>

        <div class="logo">
            <h1>PetCare</h1>
            <p>Agendamento de Consultas</p>
        </div>


        <nav>

            <a href="index.html">
                Início
            </a>

        </nav>


    </header>



    <section>

        <h2>Agendar Consulta</h2>


        <form>


            <label>
                Nome do animal
            </label>

            <input type="text" placeholder="Digite o nome do animal">


            <label>
                Data
            </label>

            <input type="date">


            <label>
                Horário
            </label>

            <input type="time">


            <label>
                Motivo da consulta
            </label>

            <textarea placeholder="Descreva o motivo">
</textarea>


            <button>
                Confirmar Agendamento
            </button>


        </form>


    </section>



    <footer>

        <p>
            PetCare Clínica Veterinária
        </p>

    </footer>


</body>

</html>
